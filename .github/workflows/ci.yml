name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  node:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run check

  python-bridge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: npm ci
      - run: npm run build
      - run: python -m pip install --upgrade pip
      - run: python -m pip install runpod-flash
      - run: node dist/cli.js generate --config examples/flashpod.config.ts --out flash_app.py
      - run: python -m py_compile flash_app.py
      - run: python -c "import flash_app; print('flash bridge import ok')"
